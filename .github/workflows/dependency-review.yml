---
name: Dependency Review

"on":
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write # Required for using the `comment-summary-in-pr` option
      id-token: write # for step-security/harden-runner to fetch OIDC token

    steps:
      - name: Harden runner (audit outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          comment-summary-in-pr: ${{ github.event_name == 'pull_request' && 'always' || 'never' }}
          fail-on-severity: moderate
          retry-on-snapshot-warnings: true
